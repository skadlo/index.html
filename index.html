<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Neon Runner - Local Edition</title>
    <style>
        :root {
            --neon-cyan: #0ff;
            --neon-magenta: #f0f;
            --glass: rgba(0, 0, 0, 0.9);
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: none; 
            color: white;
            width: 100vw;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        canvas {
            display: block;
        }

        #progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 10;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.1s linear;
        }

        .stats-left {
            position: absolute;
            top: 25px;
            left: 20px;
            pointer-events: none;
            z-index: 5;
        }

        .stats-right {
            position: absolute;
            top: 25px;
            right: 20px;
            text-align: right;
            pointer-events: none;
            z-index: 5;
            background: rgba(0, 255, 255, 0.1);
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        #level-display {
            font-size: 24px;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 4px;
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--glass);
            padding: 25px;
            border: 2px solid var(--neon-cyan);
            text-align: center;
            z-index: 20;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.25);
            border-radius: 28px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        
        input {
            background: #111;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px;
            margin-bottom: 10px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        .leaderboard {
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px;
            text-align: left;
        }
        .leaderboard-title {
            font-size: 12px;
            color: var(--neon-magenta);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 0, 255, 0.3);
            padding-bottom: 4px;
            font-weight: bold;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .leaderboard-row:last-child { border: none; }
        .lb-name { color: #fff; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
        .lb-score { color: var(--neon-cyan); font-family: monospace; }
        
        .rules-box {
            background: rgba(0, 255, 255, 0.05);
            padding: 12px;
            margin-bottom: 15px;
            text-align: left;
            font-size: 0.8rem;
            border-radius: 12px;
            border-left: 4px solid var(--neon-cyan);
            line-height: 1.4;
            color: #ddd;
        }

        .btn {
            background: var(--neon-cyan);
            color: #000;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 1.2rem;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #00cccc;
            transition: all 0.1s;
        }
        
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #00cccc;
        }

        .score-val { font-size: 32px; font-weight: 900; text-shadow: 0 0 10px var(--neon-cyan); }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--neon-cyan); opacity: 0.8; }
        
        .jump-dots { display: flex; gap: 8px; margin-top: 10px; min-height: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transition: 0.2s; }
        
        #level-toast {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            width: 100%;
        }
        .toast-main {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-magenta), 0 0 40px var(--neon-magenta);
            display: block;
        }
        .toast-sub {
            font-size: 20px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .level-up-anim { animation: toastFade 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes toastFade {
            0% { opacity: 0; transform: translate(-50%, -20%) scale(0.5); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1.2); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="level-toast">
        <span class="toast-sub" id="toast-sub-text">LEVEL PASSED</span>
        <span class="toast-main" id="toast-text">GOOD JOB!</span>
    </div>

    <div class="stats-left">
        <div id="level-display">LEVEL 1</div>
        <div class="label">Score</div>
        <div id="score" class="score-val">0</div>
        <div class="jump-dots" id="jump-indicator"></div>
    </div>

    <div class="stats-right">
        <div class="label">Personal Best</div>
        <div id="best" style="font-size: 22px; font-weight: 900; color: var(--neon-magenta); text-shadow: 0 0 8px var(--neon-magenta);">0</div>
        <div id="best-name" style="font-size: 11px; opacity: 0.8; margin-top: 2px; font-weight: bold;">---</div>
    </div>

    <div id="menu">
        <div id="menu-content">
            <h1 style="font-size: 32px; font-weight: 900; color: var(--neon-cyan); margin: 0 0 10px 0; text-shadow: 0 0 20px var(--neon-cyan);">NEON RUNNER</h1>
            
            <input type="text" id="username" placeholder="RUNNER NAME" maxlength="12">

            <div class="leaderboard" id="leaderboard-container">
                <div class="leaderboard-title">Local Top Runners</div>
                <div id="leaderboard-list">
                    <!-- High scores injected here -->
                </div>
            </div>

            <div class="rules-box">
                • 10 Levels to clear the mission<br>
                • Infinite survival after Lvl 10<br>
                • Extra jumps granted at Lvl 4 & 8
            </div>

            <button class="btn" id="start-btn">INITIATE RUN</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // --- Local Storage Leaderboard Logic ---
    let leaderboard = JSON.parse(localStorage.getItem('neon_runner_leaderboard')) || [];
    let runnerName = localStorage.getItem('neon_runner_last_name') || "";

    function updateLocalLeaderboard(name, score) {
        leaderboard.push({ name: name || "Anonymous", score: Math.floor(score) });
        // Sort descending
        leaderboard.sort((a, b) => b.score - a.score);
        // Keep top 5
        leaderboard = leaderboard.slice(0, 5);
        localStorage.setItem('neon_runner_leaderboard', JSON.stringify(leaderboard));
        renderLeaderboard();
    }

    function renderLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        const bestEl = document.getElementById('best');
        const bestNameEl = document.getElementById('best-name');
        
        if (leaderboard.length === 0) {
            list.innerHTML = '<div style="text-align:center; font-size: 12px; padding:10px; opacity:0.5;">No records found</div>';
            return;
        }

        // Top UI
        bestEl.innerText = leaderboard[0].score;
        bestNameEl.innerText = leaderboard[0].name.toUpperCase();

        // Menu List
        list.innerHTML = leaderboard.map((entry, i) => `
            <div class="leaderboard-row">
                <span class="lb-name">#${i+1} ${entry.name}</span>
                <span class="lb-score">${entry.score}</span>
            </div>
        `).join('');
    }

    // --- Game Setup ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const levelElement = document.getElementById('level-display');
    const progressBar = document.getElementById('progress-bar');
    const levelToast = document.getElementById('level-toast');
    const toastText = document.getElementById('toast-text');
    const toastSub = document.getElementById('toast-sub-text');
    const jumpIndicator = document.getElementById('jump-indicator');
    const menu = document.getElementById('menu');
    const menuContent = document.getElementById('menu-content');
    const startBtn = document.getElementById('start-btn');
    const nameInput = document.getElementById('username');

    if(runnerName) nameInput.value = runnerName;
    renderLeaderboard();

    const GRAVITY = 0.65;
    const JUMP_FORCE = -11.8; 
    const GROUND_HEIGHT = 80;
    const SCORE_PER_LEVEL = 400;

    let gameActive = false;
    let score = 0;
    let currentLevel = 1;
    let obstacles = [];
    let particles = [];
    let frameCount = 0;
    let lastSpawnFrame = 0;
    let currentSpeed = 7.5;
    let animationId = null;
    let hasClearedGame = false;

    const player = {
        x: 75, y: 0, width: 36, height: 36,
        vy: 0, jumpsLeft: 3, maxJumps: 3, trail: []
    };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.x = canvas.width < 600 ? 40 : 75;
        player.y = canvas.height - GROUND_HEIGHT - player.height;
    }
    window.addEventListener('resize', resize);
    resize();

    function updateJumpUI() {
        if (jumpIndicator.children.length !== player.maxJumps) {
            jumpIndicator.innerHTML = '';
            for(let i=0; i<player.maxJumps; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                jumpIndicator.appendChild(dot);
            }
        }
        const dots = jumpIndicator.children;
        for(let i = 0; i < player.maxJumps; i++) {
            const isActive = i < player.jumpsLeft;
            dots[i].style.opacity = isActive ? "1" : "0.15";
            dots[i].style.transform = isActive ? "scale(1)" : "scale(0.8)";
            dots[i].style.background = (player.jumpsLeft === 1 && isActive) ? "var(--neon-magenta)" : "var(--neon-cyan)";
        }
    }

    function triggerLevelUp() {
        currentLevel++;
        levelElement.innerText = currentLevel > 10 ? `INF LEVEL ${currentLevel}` : `LEVEL ${currentLevel}`;
        
        if (currentLevel === 4) player.maxJumps = 4;
        if (currentLevel === 8) player.maxJumps = 5;

        const isMobile = canvas.width < 600;
        currentSpeed += (isMobile ? 0.9 : 1.2);

        if (currentLevel === 11 && !hasClearedGame) {
            hasClearedGame = true;
            toastSub.innerText = "MISSION ACCOMPLISHED";
            toastText.innerText = "GAME CLEARED!";
        } else {
            toastSub.innerText = "LEVEL PASSED";
            toastText.innerText = "GOOD JOB!";
        }

        levelToast.classList.remove('level-up-anim');
        void levelToast.offsetWidth; 
        levelToast.classList.add('level-up-anim');

        const colors = ['#0ff', '#f0f', '#fff', '#ff0', '#0f0'];
        for(let i=0; i<80; i++) {
            particles.push({
                x: Math.random() * canvas.width, y: -20, 
                vx: (Math.random()-0.5) * 12, vy: Math.random() * 10 + 2,
                size: Math.random() * 6 + 2, life: 2, 
                color: colors[Math.floor(Math.random() * colors.length)],
                isConfetti: true
            });
        }
        updateJumpUI();
    }

    function handleJump() {
        if (!gameActive) return;
        if (player.jumpsLeft > 0) {
            player.vy = JUMP_FORCE;
            player.jumpsLeft--;
            updateJumpUI();
            for(let i=0; i<10; i++) {
                particles.push({
                    x: player.x + player.width/2, y: player.y + player.height/2,
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    size: Math.random()*5, life: 1, color: player.jumpsLeft === 0 ? '#f0f' : '#0ff'
                });
            }
        }
    }

    function startGame() {
        runnerName = nameInput.value.trim() || "Runner";
        localStorage.setItem('neon_runner_last_name', runnerName);
        nameInput.blur();
        score = 0;
        currentLevel = 1;
        hasClearedGame = false;
        levelElement.innerText = `LEVEL 1`;
        obstacles = [];
        particles = [];
        player.vy = 0;
        player.maxJumps = 3;
        player.jumpsLeft = 3;
        player.trail = [];
        currentSpeed = 7.5; 
        frameCount = 0;
        lastSpawnFrame = 0;
        menu.style.display = 'none';
        gameActive = true;
        updateJumpUI();
        if (animationId) cancelAnimationFrame(animationId);
        loop();
    }

    function gameOver() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        const finalScore = Math.floor(score);
        
        // Save to Local Leaderboard
        updateLocalLeaderboard(runnerName, finalScore);

        menu.style.display = 'block';
        menuContent.innerHTML = `
            <h2 style="color: var(--neon-magenta); margin:0; font-size: 24px;">FAILURE @ Lvl ${currentLevel}</h2>
            <div style="font-size: 60px; font-weight: 900; margin: 10px 0;">${finalScore}</div>
            
            <div class="leaderboard">
                <div class="leaderboard-title">Sector Standings</div>
                <div id="final-lb-list"></div>
            </div>

            <button class="btn" id="retry-btn">RE-START</button>
        `;
        
        const list = document.getElementById('final-lb-list');
        list.innerHTML = leaderboard.slice(0, 3).map((e, i) => `
            <div class="leaderboard-row"><span class="lb-name">#${i+1} ${e.name}</span><span class="lb-score">${e.score}</span></div>
        `).join('');

        document.getElementById('retry-btn').onclick = () => {
            location.reload();
        };
    }

    class Obstacle {
        constructor() {
            this.width = 30 + Math.random() * 30;
            const levelHeightMod = (currentLevel - 1) * 8;
            const maxHeight = Math.min(130, 45 + levelHeightMod);
            this.height = 40 + Math.random() * maxHeight;
            this.x = canvas.width + 100;
            this.y = canvas.height - GROUND_HEIGHT - this.height;
        }
        update() { this.x -= currentSpeed; }
        draw() {
            ctx.fillStyle = '#f0f';
            ctx.shadowBlur = 10; ctx.shadowColor = '#f0f';
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x+3, this.y+3, this.width-6, this.height-6);
        }
    }

    function loop() {
        if (!gameActive) return;
        frameCount++;
        
        score += (currentSpeed / 10);
        scoreElement.innerText = Math.floor(score);
        
        const levelProgress = (score % SCORE_PER_LEVEL) / SCORE_PER_LEVEL;
        progressBar.style.width = `${levelProgress * 100}%`;

        if (score >= currentLevel * SCORE_PER_LEVEL) {
            triggerLevelUp();
        }

        player.vy += GRAVITY;
        player.y += player.vy;
        const floorPos = canvas.height - GROUND_HEIGHT - player.height;
        if (player.y > floorPos) { 
            player.y = floorPos; 
            player.vy = 0; 
            if (player.jumpsLeft < player.maxJumps) {
                player.jumpsLeft = player.maxJumps; 
                updateJumpUI();
            }
        }

        player.trail.push({x: player.x, y: player.y});
        if (player.trail.length > 8) player.trail.shift();

        let minSafeFrames = Math.max(50, 70 - (currentLevel * 1.5)); 
        if (canvas.width < 600) minSafeFrames += (currentLevel > 6 ? 20 : 10); 
        
        const spawnThreshold = Math.min(0.035, 0.015 + (currentLevel * 0.002));
        if ((frameCount - lastSpawnFrame) > minSafeFrames && Math.random() < spawnThreshold) {
            obstacles.push(new Obstacle());
            lastSpawnFrame = frameCount;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i];
            obs.update();
            if (player.x < obs.x + obs.width && player.x + player.width > obs.x && 
                player.y < obs.y + obs.height && player.y + player.height > obs.y) {
                gameOver(); return;
            }
            if (obs.x + obs.width < -100) obstacles.splice(i, 1);
        }

        // Draw
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
        ctx.shadowBlur = 12; ctx.shadowColor = '#0ff';
        ctx.beginPath(); ctx.moveTo(0, canvas.height - GROUND_HEIGHT); 
        ctx.lineTo(canvas.width, canvas.height - GROUND_HEIGHT); ctx.stroke();
        ctx.shadowBlur = 0;

        player.trail.forEach((pos, i) => {
            ctx.fillStyle = `rgba(0, 255, 255, ${i * 0.04})`;
            ctx.fillRect(pos.x, pos.y, player.width, player.height);
        });
        ctx.fillStyle = '#0ff'; ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.shadowBlur = 0;
        obstacles.forEach(obs => obs.draw());
        
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy;
            if (p.isConfetti) { p.vy += 0.1; p.life -= 0.01; } else { p.life -= 0.03; }
            if (p.life <= 0) particles.splice(i, 1);
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        }
        ctx.globalAlpha = 1;
        animationId = requestAnimationFrame(loop);
    }

    startBtn.onclick = startGame;
    window.addEventListener('keydown', (e) => { 
        if(e.code === 'Space' || e.key === ' ') {
            if (gameActive) { e.preventDefault(); handleJump(); }
            else if (menu.style.display !== 'none' && !nameInput.matches(':focus')) startGame();
        }
    });
    canvas.addEventListener('touchstart', (e) => {
        if (gameActive) { e.preventDefault(); handleJump(); }
    }, {passive: false});

</script>
</body>
</html>
