<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Neon Runner</title>
    <style>
        :root {
            --neon-cyan: #0ff;
            --neon-magenta: #f0f;
            --glass: rgba(0, 0, 0, 0.9);
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: none; 
            color: white;
            width: 100vw;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .stats-left {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 5;
        }

        .stats-right {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            pointer-events: none;
            z-index: 5;
            background: rgba(0, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--glass);
            padding: 25px;
            border: 2px solid var(--neon-cyan);
            text-align: center;
            z-index: 100;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            border-radius: 28px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            max-height: 90vh;
            overflow-y: auto;
            display: block;
        }
        
        input {
            background: #111;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px;
            margin-bottom: 10px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        .leaderboard-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid rgba(0, 255, 255, 0.2);
            max-height: 180px;
            overflow-y: auto;
        }

        .leaderboard-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .score-row:last-child { border: none; }
        .score-name { color: #fff; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; text-align: left; }
        .score-val-small { color: var(--neon-magenta); font-weight: bold; font-family: monospace; }
        
        .rules-box {
            background: rgba(0, 255, 255, 0.05);
            padding: 12px;
            margin-bottom: 15px;
            text-align: left;
            font-size: 0.75rem;
            border-radius: 12px;
            border-left: 4px solid var(--neon-cyan);
            line-height: 1.4;
            color: #ccc;
        }

        .btn {
            background: var(--neon-cyan);
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 16px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #00cccc;
            transition: all 0.1s;
            margin-top: 8px;
        }
        
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #00cccc;
        }

        .score-val { font-size: 32px; font-weight: 900; text-shadow: 0 0 10px var(--neon-cyan); }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--neon-cyan); opacity: 0.8; }
        
        .jump-dots { display: flex; gap: 8px; margin-top: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transition: 0.2s; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-left">
        <div class="label">Current Run</div>
        <div id="score" class="score-val">0</div>
        <div class="jump-dots" id="jump-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="stats-right">
        <div class="label">Personal Best</div>
        <div id="best" style="font-size: 22px; font-weight: 900; color: var(--neon-magenta); text-shadow: 0 0 8px var(--neon-magenta);">0</div>
        <div id="best-name" style="font-size: 11px; opacity: 0.8; margin-top: 2px; font-weight: bold;">---</div>
    </div>

    <div id="menu">
        <div id="menu-content">
            <h1 style="font-size: 32px; font-weight: 900; color: var(--neon-cyan); margin: 0 0 10px 0; text-shadow: 0 0 20px var(--neon-cyan);">NEON RUNNER</h1>
            
            <input type="text" id="username" placeholder="ENTER PLAYER NAME" maxlength="12">

            <div class="leaderboard-container">
                <div class="leaderboard-title">Local Top Scores</div>
                <div id="local-scores">
                    <div class="score-row" style="opacity: 0.5; justify-content: center;">No history found</div>
                </div>
            </div>

            <div class="rules-box">
                <strong style="color: var(--neon-cyan);">PROTOCOLS:</strong><br>
                • Tap/Space to Jump (3x mid-air)<br>
                • Avoid Magenta Hazards<br>
                • Speed increases over time
            </div>

            <button class="btn" id="start-btn">INITIATE RUN</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // LOCAL STORAGE DATA HANDLING
    const STORAGE_KEY = 'neon_runner_local_scores';
    
    function getLocalScores() {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
    }

    function saveLocalScore(name, score) {
        let scores = getLocalScores();
        scores.push({ name, score: Math.floor(score), date: Date.now() });
        // Keep top 10
        scores.sort((a, b) => b.score - a.score);
        scores = scores.slice(0, 10);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
        renderLeaderboard();
    }

    function renderLeaderboard() {
        const container = document.getElementById('local-scores');
        const scores = getLocalScores();
        if (scores.length === 0) {
            container.innerHTML = '<div class="score-row" style="justify-content: center; opacity: 0.5;">No history found</div>';
            return;
        }
        container.innerHTML = '';
        scores.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'score-row';
            row.innerHTML = `
                <span class="score-name">${i === 0 ? '👑 ' : ''}${s.name}</span>
                <span class="score-val-small">${s.score}</span>
            `;
            container.appendChild(row);
        });

        // Update High Score UI
        if (scores.length > 0) {
            document.getElementById('best').innerText = scores[0].score;
            document.getElementById('best-name').innerText = scores[0].name.toUpperCase();
        }
    }

    // GAME ENGINE
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const menu = document.getElementById('menu');
    const startBtn = document.getElementById('start-btn');
    const nameInput = document.getElementById('username');
    const jumpDots = document.getElementById('jump-indicator').children;

    const GRAVITY = 0.65;
    const JUMP_FORCE = -12; 
    const GROUND_HEIGHT = 80;
    const MAX_JUMPS = 3; 

    let gameActive = false;
    let score = 0;
    let obstacles = [];
    let particles = [];
    let frameCount = 0;
    let currentSpeed = 7; 
    let animationId = null;

    const player = {
        x: 70, y: 0, width: 34, height: 34,
        vy: 0, jumpsLeft: MAX_JUMPS, trail: []
    };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - GROUND_HEIGHT - player.height;
        drawStaticBG();
    }

    function updateJumpUI() {
        for(let i = 0; i < MAX_JUMPS; i++) {
            const isActive = i < player.jumpsLeft;
            jumpDots[i].style.opacity = isActive ? "1" : "0.1";
            jumpDots[i].style.transform = isActive ? "scale(1)" : "scale(0.8)";
            jumpDots[i].style.background = (player.jumpsLeft === 1 && isActive) ? "var(--neon-magenta)" : "var(--neon-cyan)";
        }
    }

    function handleJump() {
        if (!gameActive) return;
        if (player.jumpsLeft > 0) {
            player.vy = JUMP_FORCE;
            player.jumpsLeft--;
            updateJumpUI();
            // Jump particles
            for(let i=0; i<6; i++) {
                particles.push({
                    x: player.x + player.width/2, y: player.y + player.height/2,
                    vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
                    size: Math.random()*3 + 1, life: 1, 
                    color: player.jumpsLeft === 0 ? '#f0f' : '#0ff'
                });
            }
        }
    }

    function startGame() {
        const name = nameInput.value.trim() || "RUNNER";
        localStorage.setItem('last_neon_name', name);
        
        score = 0; 
        obstacles = []; 
        particles = [];
        player.vy = 0; 
        player.jumpsLeft = MAX_JUMPS; 
        player.trail = [];
        currentSpeed = 7; 
        frameCount = 0;
        
        menu.style.display = 'none';
        gameActive = true;
        updateJumpUI();
        
        if (animationId) cancelAnimationFrame(animationId);
        loop();
    }

    function gameOver() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        
        const finalScore = Math.floor(score);
        const name = nameInput.value.trim() || "RUNNER";
        saveLocalScore(name, finalScore);

        menu.style.display = 'block';
        const scores = getLocalScores();
        
        // Refresh retry screen
        document.getElementById('menu-content').innerHTML = `
            <h2 style="color: var(--neon-magenta); margin:0; font-size: 24px;">RUN TERMINATED</h2>
            <div style="font-size: 54px; font-weight: 900; margin: 10px 0; text-shadow: 0 0 15px var(--neon-magenta);">${finalScore}</div>
            
            <div class="leaderboard-container">
                <div class="leaderboard-title">Top Scores</div>
                <div id="retry-scores"></div>
            </div>

            <button class="btn" id="retry-btn">RE-INITIALIZE</button>
        `;
        
        const retryList = document.getElementById('retry-scores');
        scores.slice(0, 5).forEach((s, i) => {
            retryList.innerHTML += `
                <div class="score-row">
                    <span class="score-name">${i === 0 ? '👑 ' : ''}${s.name}</span>
                    <span class="score-val-small">${s.score}</span>
                </div>
            `;
        });

        document.getElementById('retry-btn').onclick = () => location.reload();
    }

    class Obstacle {
        constructor() {
            this.width = 28 + Math.random() * 25;
            this.height = 35 + Math.random() * 55;
            this.x = canvas.width + 50;
            this.y = canvas.height - GROUND_HEIGHT - this.height;
        }
        update() { this.x -= currentSpeed; }
        draw() {
            ctx.fillStyle = '#f0f';
            ctx.shadowBlur = 15; ctx.shadowColor = '#f0f';
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x+2, this.y+2, this.width-4, this.height-4);
        }
    }

    function drawStaticBG() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 4;
        ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
        ctx.beginPath(); 
        ctx.moveTo(0, canvas.height - GROUND_HEIGHT); 
        ctx.lineTo(canvas.width, canvas.height - GROUND_HEIGHT); 
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    function loop() {
        if (!gameActive) return;
        frameCount++;
        score += 0.15;
        scoreElement.innerText = Math.floor(score);
        
        if (frameCount % 800 === 0) currentSpeed += 0.4;
        
        player.vy += GRAVITY; 
        player.y += player.vy;
        
        const floorPos = canvas.height - GROUND_HEIGHT - player.height;
        if (player.y > floorPos) { 
            player.y = floorPos; 
            player.vy = 0; 
            if (player.jumpsLeft < MAX_JUMPS) { 
                player.jumpsLeft = MAX_JUMPS; 
                updateJumpUI(); 
            }
        }
        
        player.trail.push({x: player.x, y: player.y});
        if (player.trail.length > 6) player.trail.shift();

        const spawnRate = Math.max(40, 110 - (currentSpeed * 4.5));
        if (frameCount % Math.floor(spawnRate) === 0) obstacles.push(new Obstacle());

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i]; 
            obs.update();
            // Collision
            if (player.x < obs.x + obs.width - 4 && player.x + player.width > obs.x + 4 && 
                player.y < obs.y + obs.height - 4 && player.y + player.height > obs.y + 4) {
                gameOver(); return;
            }
            if (obs.x + obs.width < -100) obstacles.splice(i, 1);
        }

        drawStaticBG();

        player.trail.forEach((pos, i) => {
            ctx.fillStyle = `rgba(0, 255, 255, ${i * 0.05})`;
            ctx.fillRect(pos.x, pos.y, player.width, player.height);
        });

        ctx.fillStyle = '#0ff'; ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.shadowBlur = 0;

        obstacles.forEach(obs => obs.draw());

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            if (p.life <= 0) particles.splice(i, 1);
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        }
        ctx.globalAlpha = 1;

        animationId = requestAnimationFrame(loop);
    }

    // Startup
    window.addEventListener('load', () => {
        resize();
        renderLeaderboard();
        const savedName = localStorage.getItem('last_neon_name');
        if (savedName) nameInput.value = savedName;
    });

    window.addEventListener('resize', resize);
    
    startBtn.addEventListener('click', startGame);
    
    window.addEventListener('keydown', (e) => { 
        if(e.code === 'Space' || e.key === ' ') {
            if (gameActive) { e.preventDefault(); handleJump(); }
            else if (menu.style.display !== 'none' && !nameInput.matches(':focus')) startGame();
        }
    });

    canvas.addEventListener('touchstart', (e) => {
        if (gameActive) { e.preventDefault(); handleJump(); }
    }, {passive: false});

</script>
</body>
</html>
