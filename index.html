<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Neon Runner</title>
    <style>
        :root {
            --neon-cyan: #0ff;
            --neon-magenta: #f0f;
            --glass: rgba(0, 0, 0, 0.85);
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: none; 
            color: white;
            width: 100vw;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        canvas {
            display: block;
        }

        .stats-left {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 5;
        }

        .stats-right {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            pointer-events: none;
            z-index: 5;
            background: rgba(0, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--glass);
            padding: 25px;
            border: 2px solid var(--neon-cyan);
            text-align: center;
            z-index: 10;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.25);
            border-radius: 28px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        input {
            background: #111;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px;
            margin-bottom: 10px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        .leaderboard-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid rgba(0, 255, 255, 0.2);
            max-height: 200px;
            overflow-y: auto;
        }

        .leaderboard-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: bold;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.5);
            padding: 4px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .score-row:last-child { border: none; }
        .score-name { color: #fff; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; text-align: left; }
        .score-val-small { color: var(--neon-magenta); font-weight: bold; font-family: monospace; }
        
        .rules-box {
            background: rgba(0, 255, 255, 0.05);
            padding: 12px;
            margin-bottom: 15px;
            text-align: left;
            font-size: 0.75rem;
            border-radius: 12px;
            border-left: 4px solid var(--neon-cyan);
            line-height: 1.4;
            color: #ccc;
        }

        .btn {
            background: var(--neon-cyan);
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 16px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #00cccc;
            transition: all 0.1s;
            margin-top: 8px;
        }
        
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #00cccc;
        }

        .score-val { font-size: 32px; font-weight: 900; text-shadow: 0 0 10px var(--neon-cyan); }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--neon-cyan); opacity: 0.8; }
        
        .jump-dots { display: flex; gap: 8px; margin-top: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transition: 0.2s; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-left">
        <div class="label">Current Run</div>
        <div id="score" class="score-val">0</div>
        <div class="jump-dots" id="jump-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="stats-right">
        <div class="label">Your Best</div>
        <div id="best" style="font-size: 22px; font-weight: 900; color: var(--neon-magenta); text-shadow: 0 0 8px var(--neon-magenta);">0</div>
        <div id="best-name" style="font-size: 11px; opacity: 0.8; margin-top: 2px; font-weight: bold;">---</div>
    </div>

    <div id="menu">
        <div id="menu-content">
            <h1 style="font-size: 32px; font-weight: 900; color: var(--neon-cyan); margin: 0 0 10px 0; text-shadow: 0 0 20px var(--neon-cyan);">NEON RUNNER</h1>
            
            <input type="text" id="username" placeholder="ENTER YOUR NAME" maxlength="12">

            <div class="leaderboard-container" id="leaderboard-box">
                <div class="leaderboard-title">Global Hall of Fame</div>
                <div id="global-scores">
                    <div class="score-row" style="opacity: 0.5; justify-content: center;">Initializing Matrix...</div>
                </div>
            </div>

            <div class="rules-box">
                <strong style="color: var(--neon-cyan);">PROTOCOLS:</strong><br>
                • Tap to Jump (up to 3x mid-air)<br>
                • Speed increases as you run<br>
                • Do not touch Magenta Hazards
            </div>

            <button class="btn" id="start-btn">INITIATE RUN</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // Global variables provided by environment
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'neon-runner-v2';

    let user = null;
    const globalScoresContainer = document.getElementById('global-scores');

    // Cloud Database Setup
    const initCloud = async () => {
        try {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    // Subscribe to scores
                    const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                    onSnapshot(scoresRef, (snapshot) => {
                        const allScores = [];
                        snapshot.forEach(doc => allScores.push(doc.data()));
                        
                        // Sort by score descending and then by time
                        allScores.sort((a, b) => b.score - a.score);
                        
                        // Show Top 10
                        const top10 = allScores.slice(0, 10);
                        renderLeaderboard(top10);
                    }, (err) => {
                        console.error("Firestore Error:", err);
                        globalScoresContainer.innerHTML = '<div class="score-row">Network Error</div>';
                    });
                }
            });
        } catch (e) {
            console.error("Auth Error:", e);
        }
    };

    function renderLeaderboard(scores) {
        if (!scores.length) {
            globalScoresContainer.innerHTML = '<div class="score-row" style="justify-content:center">No Data Yet</div>';
            return;
        }
        globalScoresContainer.innerHTML = '';
        scores.forEach((s, index) => {
            const row = document.createElement('div');
            row.className = 'score-row';
            const crown = index === 0 ? '👑 ' : '';
            row.innerHTML = `
                <span class="score-name">${crown}${s.name}</span>
                <span class="score-val-small">${Math.floor(s.score)}</span>
            `;
            globalScoresContainer.appendChild(row);
        });
    }

    initCloud();

    // GAME ENGINE
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const bestElement = document.getElementById('best');
    const bestNameElement = document.getElementById('best-name');
    const jumpDots = document.getElementById('jump-indicator').children;
    const menu = document.getElementById('menu');
    const menuContent = document.getElementById('menu-content');
    const startBtn = document.getElementById('start-btn');
    const nameInput = document.getElementById('username');

    const GRAVITY = 0.6;
    const JUMP_FORCE = -11.5; 
    const GROUND_HEIGHT = 80;
    const MAX_JUMPS = 3; 

    let gameActive = false;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('nr_best_val')) || 0;
    let highName = localStorage.getItem('nr_best_name') || "---";
    let obstacles = [];
    let particles = [];
    let frameCount = 0;
    let currentSpeed = 6.5; 
    let animationId = null;
    let runnerName = localStorage.getItem('nr_last_name') || "";

    // Load saved name
    if(runnerName) nameInput.value = runnerName;
    bestElement.innerText = highScore;
    bestNameElement.innerText = highName.toUpperCase();

    const player = {
        x: 75, y: 0, width: 36, height: 36,
        vy: 0, jumpsLeft: MAX_JUMPS, trail: []
    };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - GROUND_HEIGHT - player.height;
    }
    window.addEventListener('resize', resize);
    resize();

    function updateJumpUI() {
        for(let i = 0; i < MAX_JUMPS; i++) {
            const isActive = i < player.jumpsLeft;
            jumpDots[i].style.opacity = isActive ? "1" : "0.15";
            jumpDots[i].style.transform = isActive ? "scale(1)" : "scale(0.8)";
            jumpDots[i].style.background = (player.jumpsLeft === 1 && isActive) ? "var(--neon-magenta)" : "var(--neon-cyan)";
        }
    }

    function handleJump() {
        if (!gameActive) return;
        if (player.jumpsLeft > 0) {
            player.vy = JUMP_FORCE;
            player.jumpsLeft--;
            updateJumpUI();
            for(let i=0; i<8; i++) {
                particles.push({
                    x: player.x + player.width/2, y: player.y + player.height/2,
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    size: Math.random()*4, life: 1, 
                    color: player.jumpsLeft === 0 ? '#f0f' : '#0ff'
                });
            }
        }
    }

    async function submitScore(name, finalScore) {
        if (!user || finalScore <= 0) return;
        try {
            const scoreDoc = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', user.uid);
            await setDoc(scoreDoc, {
                name: name.substring(0, 12),
                score: finalScore,
                timestamp: Date.now(),
                userId: user.uid
            }, { merge: true });
        } catch (e) { console.error("Cloud Save Fail:", e); }
    }

    function startGame() {
        runnerName = nameInput.value.trim() || "Runner";
        localStorage.setItem('nr_last_name', runnerName);
        nameInput.blur();
        
        score = 0; obstacles = []; particles = [];
        player.vy = 0; player.jumpsLeft = MAX_JUMPS; player.trail = [];
        currentSpeed = 6.5; frameCount = 0;
        
        menu.style.display = 'none';
        gameActive = true;
        updateJumpUI();
        if (animationId) cancelAnimationFrame(animationId);
        loop();
    }

    function gameOver() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        const finalScore = Math.floor(score);
        
        submitScore(runnerName, finalScore);
        
        if (finalScore > highScore) {
            highScore = finalScore;
            highName = runnerName;
            localStorage.setItem('nr_best_val', highScore);
            localStorage.setItem('nr_best_name', highName);
            bestElement.innerText = highScore;
            bestNameElement.innerText = highName.toUpperCase();
        }

        menu.style.display = 'block';
        menuContent.innerHTML = `
            <h2 style="color: var(--neon-magenta); margin:0; font-size: 24px;">RUN TERMINATED</h2>
            <div style="font-size: 54px; font-weight: 900; margin: 10px 0; text-shadow: 0 0 15px var(--neon-magenta);">${finalScore}</div>
            
            <div class="leaderboard-container" style="background: rgba(0,0,0,0.3)">
                <div class="leaderboard-title">Global Rankings</div>
                <div id="final-scores-list"></div>
            </div>

            <button class="btn" id="retry-btn">RETRY RUN</button>
        `;
        
        // Populate the list from the live data we already have
        document.getElementById('final-scores-list').innerHTML = globalScoresContainer.innerHTML;
        document.getElementById('retry-btn').onclick = () => location.reload();
    }

    class Obstacle {
        constructor() {
            this.width = 25 + Math.random() * 30;
            this.height = 40 + Math.random() * Math.min(120, 45 + currentSpeed * 2.5);
            this.x = canvas.width + 100;
            this.y = canvas.height - GROUND_HEIGHT - this.height;
        }
        update() { this.x -= currentSpeed; }
        draw() {
            ctx.fillStyle = '#f0f';
            ctx.shadowBlur = 15; ctx.shadowColor = '#f0f';
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x+3, this.y+3, this.width-6, this.height-6);
        }
    }

    function drawBG() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Ground line
        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 4;
        ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
        ctx.beginPath(); ctx.moveTo(0, canvas.height - GROUND_HEIGHT); 
        ctx.lineTo(canvas.width, canvas.height - GROUND_HEIGHT); ctx.stroke();
        ctx.shadowBlur = 0;

        // Grid lines for depth
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        for(let i=0; i<10; i++) {
            let y = canvas.height - GROUND_HEIGHT + (i * 20);
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
    }

    function loop() {
        if (!gameActive) return;
        frameCount++;
        score += 0.15;
        scoreElement.innerText = Math.floor(score);
        
        if (frameCount % 600 === 0) currentSpeed += 0.3;
        
        player.vy += GRAVITY; player.y += player.vy;
        const floorPos = canvas.height - GROUND_HEIGHT - player.height;
        if (player.y > floorPos) { 
            player.y = floorPos; player.vy = 0; 
            if (player.jumpsLeft < MAX_JUMPS) { 
                player.jumpsLeft = MAX_JUMPS; 
                updateJumpUI(); 
            }
        }
        
        player.trail.push({x: player.x, y: player.y});
        if (player.trail.length > 8) player.trail.shift();

        const spawnRate = Math.max(35, 100 - (currentSpeed * 4));
        if (frameCount % Math.floor(spawnRate) === 0) obstacles.push(new Obstacle());

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i]; obs.update();
            if (player.x < obs.x + obs.width - 5 && player.x + player.width > obs.x + 5 && 
                player.y < obs.y + obs.height - 5 && player.y + player.height > obs.y + 5) {
                gameOver(); return;
            }
            if (obs.x + obs.width < -100) obstacles.splice(i, 1);
        }

        drawBG();

        // Trail
        player.trail.forEach((pos, i) => {
            ctx.fillStyle = `rgba(0, 255, 255, ${i * 0.04})`;
            ctx.fillRect(pos.x, pos.y, player.width, player.height);
        });

        // Player
        ctx.fillStyle = '#0ff'; ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.shadowBlur = 0;

        obstacles.forEach(obs => obs.draw());

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.04;
            if (p.life <= 0) particles.splice(i, 1);
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        }
        ctx.globalAlpha = 1;

        animationId = requestAnimationFrame(loop);
    }

    startBtn.onclick = startGame;
    
    // Controls
    window.addEventListener('keydown', (e) => { 
        if(e.code === 'Space' || e.key === ' ') {
            if (gameActive) { e.preventDefault(); handleJump(); }
            else if (menu.style.display !== 'none' && !nameInput.matches(':focus')) startGame();
        }
    });
    canvas.addEventListener('touchstart', (e) => {
        if (gameActive) { e.preventDefault(); handleJump(); }
    }, {passive: false});
</script>
</body>
</html>
