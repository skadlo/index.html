<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Neon Runner - Local Edition</title>
    <style>
        :root {
            --neon-cyan: #0ff;
            --neon-magenta: #f0f;
            --glass: rgba(0, 0, 0, 0.9);
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: none; 
            color: white;
            width: 100vw;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        canvas {
            display: block;
        }

        #progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 10;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.1s linear;
        }

        .stats-left {
            position: absolute;
            top: 25px;
            left: 20px;
            pointer-events: none;
            z-index: 5;
        }

        .stats-right {
            position: absolute;
            top: 25px;
            right: 20px;
            text-align: right;
            pointer-events: none;
            z-index: 5;
            background: rgba(0, 255, 255, 0.1);
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        #level-display {
            font-size: 24px;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 4px;
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--glass);
            padding: 25px;
            border: 2px solid var(--neon-cyan);
            text-align: center;
            z-index: 20;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.25);
            border-radius: 28px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: block;
        }
        
        input {
            background: #111;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px;
            margin-bottom: 10px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        .leaderboard {
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px;
            text-align: left;
        }
        .leaderboard-title {
            font-size: 12px;
            color: var(--neon-magenta);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 0, 255, 0.3);
            padding-bottom: 4px;
            font-weight: bold;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .leaderboard-row:last-child { border: none; }
        .lb-name { color: #fff; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
        .lb-score { color: var(--neon-cyan); font-family: monospace; }
        
        .rules-box {
            background: rgba(0, 255, 255, 0.05);
            padding: 12px;
            margin-bottom: 15px;
            text-align: left;
            font-size: 0.8rem;
            border-radius: 12px;
            border-left: 4px solid var(--neon-cyan);
            line-height: 1.4;
            color: #ddd;
        }

        .btn {
            background: var(--neon-cyan);
            color: #000;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 1.2rem;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #00cccc;
            transition: all 0.1s;
            margin-bottom: 12px;
        }
        
        .btn.secondary {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: none;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #00cccc;
        }

        .score-val { font-size: 32px; font-weight: 900; text-shadow: 0 0 10px var(--neon-cyan); }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--neon-cyan); opacity: 0.8; }
        
        .jump-dots { display: flex; gap: 8px; margin-top: 10px; min-height: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transition: 0.2s; }
        
        #level-toast {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            width: 100%;
        }
        .toast-main {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-magenta), 0 0 40px var(--neon-magenta);
            display: block;
        }
        .toast-sub {
            font-size: 20px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .level-up-anim { animation: toastFade 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes toastFade {
            0% { opacity: 0; transform: translate(-50%, -20%) scale(0.5); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1.2); }
        }

        #flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: red;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
        }

        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 30px var(--neon-cyan);
            z-index: 50;
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="flash-overlay"></div>
<div id="countdown">3</div>
<div id="game-container">
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="level-toast">
        <span class="toast-sub" id="toast-sub-text">LEVEL PASSED</span>
        <span class="toast-main" id="toast-text">GOOD JOB!</span>
    </div>

    <div class="stats-left">
        <div id="level-display">LEVEL 1</div>
        <div class="label">Score</div>
        <div id="score" class="score-val">0</div>
        <div class="jump-dots" id="jump-indicator"></div>
    </div>

    <div class="stats-right">
        <div class="label">Personal Best</div>
        <div id="best" style="font-size: 22px; font-weight: 900; color: var(--neon-magenta); text-shadow: 0 0 8px var(--neon-magenta);">0</div>
        <div id="best-name" style="font-size: 11px; opacity: 0.8; margin-top: 2px; font-weight: bold;">---</div>
    </div>

    <div id="menu">
        <div id="menu-content">
            <h1 style="font-size: 32px; font-weight: 900; color: var(--neon-cyan); margin: 0 0 10px 0; text-shadow: 0 0 20px var(--neon-cyan);">NEON RUNNER</h1>
            
            <input type="text" id="username" placeholder="RUNNER NAME" maxlength="12">

            <div class="leaderboard" id="leaderboard-container">
                <div class="leaderboard-title">Local Top Runners</div>
                <div id="leaderboard-list">
                    <!-- High scores injected here -->
                </div>
            </div>

            <div class="rules-box">
                • 10 Levels to clear the mission<br>
                • Infinite Mode follows mission clear
            </div>

            <button class="btn" id="start-btn">INITIATE RUN</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // --- State & Storage ---
    let leaderboard = JSON.parse(localStorage.getItem('neon_runner_lb_v2')) || [];
    let runnerName = localStorage.getItem('neon_runner_name_v2') || "";
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const levelElement = document.getElementById('level-display');
    const progressBar = document.getElementById('progress-bar');
    const menu = document.getElementById('menu');
    const menuContent = document.getElementById('menu-content');
    const flashOverlay = document.getElementById('flash-overlay');
    const nameInput = document.getElementById('username');
    const jumpIndicator = document.getElementById('jump-indicator');
    const countdownEl = document.getElementById('countdown');

    const GRAVITY = 0.65;
    const JUMP_FORCE = -11.8; 
    const GROUND_HEIGHT = 80;
    const SCORE_PER_LEVEL = 400;

    let gameActive = false;
    let score = 0;
    let currentLevel = 1;
    let obstacles = [];
    let frameCount = 0;
    let lastSpawnFrame = 0;
    let currentSpeed = 7.5;
    let animationId = null;
    let isInfiniteMode = false;
    let shakeAmount = 0;
    let isCountdownActive = false;

    const player = {
        x: 75, y: 0, width: 36, height: 36,
        vy: 0, jumpsLeft: 3, maxJumps: 3
    };

    // --- Init ---
    if(runnerName) nameInput.value = runnerName;
    renderLeaderboard();

    function renderLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        const bestEl = document.getElementById('best');
        const bestNameEl = document.getElementById('best-name');
        
        if (leaderboard.length === 0) {
            list.innerHTML = '<div style="text-align:center; font-size: 12px; padding:10px; opacity:0.5;">No records</div>';
            return;
        }

        bestEl.innerText = leaderboard[0].score;
        bestNameEl.innerText = leaderboard[0].name.toUpperCase();
        list.innerHTML = leaderboard.map((e, i) => `
            <div class="leaderboard-row"><span class="lb-name">#${i+1} ${e.name}</span><span class="lb-score">${e.score}</span></div>
        `).join('');
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.x = canvas.width < 600 ? 40 : 75;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Logic ---

    function updateJumpUI() {
        if (jumpIndicator.children.length !== player.maxJumps) {
            jumpIndicator.innerHTML = '';
            for(let i=0; i<player.maxJumps; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                jumpIndicator.appendChild(dot);
            }
        }
        const dots = jumpIndicator.children;
        for(let i = 0; i < player.maxJumps; i++) {
            const isActive = i < player.jumpsLeft;
            dots[i].style.opacity = isActive ? "1" : "0.15";
            dots[i].style.background = (player.jumpsLeft === 1 && isActive) ? "var(--neon-magenta)" : "var(--neon-cyan)";
        }
    }

    function triggerLevelUp() {
        if (currentLevel === 10 && !isInfiniteMode) {
            pauseForChoice();
            return;
        }
        currentLevel++;
        levelElement.innerText = isInfiniteMode ? `INF LVL ${currentLevel}` : `LEVEL ${currentLevel}`;
        if (currentLevel === 4) player.maxJumps = 4;
        if (currentLevel === 8) player.maxJumps = 5;
        currentSpeed += (canvas.width < 600 ? 0.8 : 1.1);
        
        const toast = document.getElementById('level-toast');
        toast.classList.remove('level-up-anim');
        void toast.offsetWidth;
        toast.classList.add('level-up-anim');
        updateJumpUI();
    }

    function startCountdown(callback) {
        isCountdownActive = true;
        countdownEl.style.display = 'block';
        let count = 3;
        countdownEl.innerText = count;
        
        // Clear all obstacles and reset spawn timer so player isn't immediately hit
        obstacles = [];
        lastSpawnFrame = frameCount + 120; // 2 second delay on next spawn after GO

        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownEl.innerText = count;
            } else if (count === 0) {
                countdownEl.innerText = "GO!";
            } else {
                clearInterval(interval);
                countdownEl.style.display = 'none';
                isCountdownActive = false;
                callback();
            }
        }, 800);
    }

    function pauseForChoice() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        menu.style.display = 'block';
        menuContent.innerHTML = `
            <h2 style="color: var(--neon-cyan); margin:0;">MISSION CLEAR</h2>
            <div style="font-size: 60px; font-weight: 900; color: var(--neon-cyan);">${Math.floor(score)}</div>
            <button class="btn" id="finish-btn">CLAIM VICTORY</button>
            <button class="btn secondary" id="inf-btn">GO INFINITE</button>
        `;
        document.getElementById('finish-btn').onclick = () => endGameUI("VICTORY");
        document.getElementById('inf-btn').onclick = () => {
            isInfiniteMode = true;
            menu.style.display = 'none';
            startCountdown(() => {
                gameActive = true;
                triggerLevelUp();
                loop();
            });
        };
    }

    function endGameUI(type) {
        gameActive = false;
        cancelAnimationFrame(animationId);
        
        const finalScore = Math.floor(score);
        leaderboard.push({ name: runnerName || "Runner", score: finalScore });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, 5);
        localStorage.setItem('neon_runner_lb_v2', JSON.stringify(leaderboard));

        menu.style.display = 'block';
        const color = type === "VICTORY" ? "var(--neon-cyan)" : "var(--neon-magenta)";
        menuContent.innerHTML = `
            <h2 style="color: ${color}; margin:0;">${type === "VICTORY" ? "WINNER" : "GAME OVER"}</h2>
            <div style="font-size: 14px; opacity: 0.7;">Lvl ${currentLevel} ${isInfiniteMode ? '(Infinite)' : ''}</div>
            <div style="font-size: 60px; font-weight: 900; margin: 10px 0; color: ${color};">${finalScore}</div>
            <div class="leaderboard" id="final-lb"></div>
            <button class="btn" onclick="location.reload()">RETRY</button>
        `;
        
        const list = document.getElementById('final-lb');
        list.innerHTML = leaderboard.map((e, i) => `
            <div class="leaderboard-row"><span>#${i+1} ${e.name}</span><span>${e.score}</span></div>
        `).join('');
    }

    function startGame() {
        runnerName = nameInput.value.trim() || "Runner";
        localStorage.setItem('neon_runner_name_v2', runnerName);
        
        score = 0; currentLevel = 1; isInfiniteMode = false;
        obstacles = []; frameCount = 0;
        currentSpeed = 7.5; player.vy = 0; player.maxJumps = 3;
        player.jumpsLeft = 3;
        player.y = canvas.height - GROUND_HEIGHT - player.height;
        
        menu.style.display = 'none';
        gameActive = true;
        updateJumpUI();
        loop();
    }

    function loop() {
        if (!gameActive) return;

        if (shakeAmount > 0) shakeAmount *= 0.9;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (shakeAmount > 0.5) {
            ctx.translate((Math.random()-0.5)*shakeAmount, (Math.random()-0.5)*shakeAmount);
        }

        frameCount++;
        score += (currentSpeed / 10);
        scoreElement.innerText = Math.floor(score);
        
        const levelProgress = (score % SCORE_PER_LEVEL) / SCORE_PER_LEVEL;
        progressBar.style.width = `${levelProgress * 100}%`;
        if (score >= currentLevel * SCORE_PER_LEVEL) triggerLevelUp();

        player.vy += GRAVITY;
        player.y += player.vy;
        const floorPos = canvas.height - GROUND_HEIGHT - player.height;
        if (player.y > floorPos) {
            player.y = floorPos; player.vy = 0;
            if (player.jumpsLeft < player.maxJumps) {
                player.jumpsLeft = player.maxJumps; updateJumpUI();
            }
        }

        // Spawning logic (only spawn if countdown isn't active)
        let minSafe = Math.max(45, 65 - currentLevel);
        if (!isCountdownActive && (frameCount - lastSpawnFrame) > minSafe && Math.random() < 0.04) {
            const h = 40 + Math.random() * Math.min(130, 40 + currentLevel * 7);
            obstacles.push({ x: canvas.width + 50, y: canvas.height - GROUND_HEIGHT - h, w: 30+Math.random()*25, h: h });
            lastSpawnFrame = frameCount;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const o = obstacles[i];
            o.x -= currentSpeed;
            
            if (player.x < o.x + o.w && player.x + player.width > o.x && 
                player.y < o.y + o.h && player.y + player.height > o.y) {
                
                gameActive = false;
                shakeAmount = 20;
                flashOverlay.style.opacity = '0.5';
                setTimeout(() => { flashOverlay.style.opacity = '0'; }, 100);
                
                cancelAnimationFrame(animationId);
                endGameUI("DEFEAT");
                return;
            }
            if (o.x < -100) obstacles.splice(i, 1);
        }

        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0, canvas.height - GROUND_HEIGHT); ctx.lineTo(canvas.width, canvas.height - GROUND_HEIGHT); ctx.stroke();

        ctx.fillStyle = '#0ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        
        ctx.fillStyle = '#f0f';
        obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

        animationId = requestAnimationFrame(loop);
    }

    function handleAction() {
        if (!gameActive || isCountdownActive) return; // Prevent jump during countdown
        if (player.jumpsLeft > 0) {
            player.vy = JUMP_FORCE;
            player.jumpsLeft--;
            updateJumpUI();
        }
    }

    document.getElementById('start-btn').onclick = startGame;
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); handleAction(); }});
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); }, {passive: false});

</script>
</body>
</html>
